app:
  mcp_toolbox_url: "https://toolbox-cymbal-transit-711517179568.us-central1.run.app/mcp"
  gemini_model_name: ${GEMINI_MODEL_NAME:gemini-2.5-flash}


sources:
    alloydb:
        kind: "alloydb-postgres"
        project: "gen-lang-client-0702920276"
        region: "us-central1"
        cluster: "my-alloydb-cluster010"
        instance: "my-primary-inst010"
        database: "postgres"
        user: "postgres"
        password: "alloydb"
        ipType: "public"

authServices:
  google_auth:
    kind: google
    clientId: ${TOOLBOX_GOOGLE_CLIENT_ID}

tools:
  find-bus-schedules:
    kind: postgres-sql
    source: alloydb
    description: Find all available bus schedules.
    statement: |
      SELECT
        CAST(b.trip_id AS TEXT) AS trip_id,
        TO_CHAR(b.departure_time, 'Mon DD, YYYY HH12:MI AM') AS departure_time,
        TO_CHAR(b.arrival_time, 'Mon DD, YYYY HH12:MI AM') AS arrival_time,
        b.ticket_price,
        b.available_seats,
        b.origin_city,
        b.destination_city
      FROM bus_schedules b
      WHERE b.available_seats > 0
        AND b.departure_time >= CURRENT_TIMESTAMP
      ORDER BY b.departure_time ASC
      LIMIT 500;

  query-schedules:
    kind: postgres-sql
    source: alloydb
    description: Find available bus schedules between an origin and destination city.
    parameters:
      - name: origin
        type: string
        description: The departure city name.
      - name: destination
        type: string
        description: The arrival city name.
      - name: travel_date
        type: string
        description: Requested travel date in YYYY-MM-DD format. Empty means no exact date filter.
    statement: |
      SELECT
        CAST(b.trip_id AS TEXT) AS trip_id,
        TO_CHAR(b.departure_time, 'Mon DD, YYYY HH12:MI AM') AS departure_time,
        TO_CHAR(b.arrival_time, 'Mon DD, YYYY HH12:MI AM') AS arrival_time,
        b.ticket_price,
        b.available_seats,
        b.origin_city,
        b.destination_city
      FROM bus_schedules b
      WHERE lower(b.origin_city) = lower($1)
        AND lower(b.destination_city) = lower($2)
        AND b.available_seats > 0
        AND b.departure_time >= CURRENT_TIMESTAMP
        AND (
          NULLIF($3, '')::date IS NULL
          OR b.departure_time::date = NULLIF($3, '')::date
        )
      ORDER BY b.departure_time ASC
      LIMIT 300;

  book-ticket:
    kind: postgres-sql
    source: alloydb
    description: Books a ticket for a specific trip, decrementing available seats and generating a confirmed booking record.
    parameters:
      - name: trip_id
        type: string
        description: The UUID of the trip schedule to book.
      - name: passenger_name
        type: string
        description: Name or ID of the passenger.
        authServices:
          - name: google_auth
            field: sub
    statement: |
      WITH updated_schedule AS (
        UPDATE bus_schedules
        SET available_seats = available_seats - 1
        WHERE trip_id = CAST($1 AS UUID)
          AND available_seats > 0
        RETURNING trip_id
      )
      INSERT INTO bookings (trip_id, passenger_id)
      SELECT trip_id, $2
      FROM updated_schedule
      RETURNING CAST(booking_id AS TEXT) AS booking_id, trip_id, passenger_id, status,
            TO_CHAR(booking_time, 'Mon DD, YYYY HH12:MI AM') AS booking_time;

  # Same booking logic, exposed for UI-oriented clients.
  book-ticket-ui:
    kind: postgres-sql
    source: alloydb
    description: UI variant for booking tickets.
    parameters:
      - name: trip_id
        type: string
        description: The UUID of the trip schedule to book.
      - name: passenger_name
        type: string
        description: Name or ID of the passenger.
    statement: |
      WITH updated_schedule AS (
        UPDATE bus_schedules
        SET available_seats = available_seats - 1
        WHERE trip_id = CAST($1 AS UUID)
          AND available_seats > 0
        RETURNING trip_id
      )
      INSERT INTO bookings (trip_id, passenger_id)
      SELECT trip_id, $2
      FROM updated_schedule
      RETURNING CAST(booking_id AS TEXT) AS booking_id, trip_id, passenger_id, status,
            TO_CHAR(booking_time, 'Mon DD, YYYY HH12:MI AM') AS booking_time;

  search-policies:
    kind: postgres-sql
    source: alloydb
    description: Semantic search for transit policies regarding luggage, pets, refunds, and general rules.
    parameters:
      - name: search_query
        type: string
        description: The user's question about transit policies to be embedded and searched.
    statement: |
      SELECT category, policy_text
      FROM transit_policies
      ORDER BY policy_embedding <=> CAST(embedding('${GEMINI_MODEL_NAME:gemini-2.5-flash}', $1) AS vector(768))
      LIMIT 2;
